{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Transaction - Revolut</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <!-- Chaport Live Chat -->
    <script type="text/javascript">
        (function(w,d,v3){
            w.chaportConfig = { appId: '6a43a2901fd734cd86c8645d' };
            if(w.chaport)return;v3=w.chaport={};v3._q=[];v3._l={};v3.q=function(){v3._q.push(arguments)};v3.on=function(e,fn){if(!v3._l[e])v3._l[e]=[];v3._l[e].push(fn)};var s=d.createElement('script');s.type='text/javascript';s.async=true;s.src='https://app.chaport.com/javascripts/insert.js';var ss=d.getElementsByTagName('script')[0];ss.parentNode.insertBefore(s,ss)})(window, document);
    </script>
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/blue-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/blue-16x16.png' %}">
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <link rel="apple-touch-icon" href="{% static 'images/blue-180x180.png' %}">
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#0a3ee3">
    <link rel="icon" href="{% static 'images/IMG-20250820-WA0109.jpg' %}" type="image/x-icon">
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ============================================================
               REVOLUT MODERN DARK UI — PENDING / FROZEN PAGE
               Consistent with bank, crypto, PayPal, etc.
               ============================================================ */
        :root {
            --bg-primary: #0b0b0f;
            --bg-secondary: #14141a;
            --bg-card: #1a1a24;
            --bg-input: #1e1e2a;
            --text-primary: #f1f3f7;
            --text-secondary: #a8b0c8;
            --text-muted: #6a7290;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --accent-blue: #2b7aff;
            --accent-glow: rgba(43, 122, 255, 0.25);
            --warning: #f39c12;
            --error: #e74c3c;
            --success: #2ecc71;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --shadow-card: 0 12px 40px rgba(0, 0, 0, 0.55);
            --transition-med: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: auto;
            -webkit-font-smoothing: antialiased;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Loading Container (Card) */
        .loading-container {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            box-shadow: var(--shadow-card);
            animation: slideUp 0.8s ease-out 0.3s both;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--border-subtle);
            position: relative;
            overflow: hidden;
            transform: translateY(30px);
            opacity: 0;
        }

        .loading-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), #6c5ce7);
            animation: colorFlow 3s ease-in-out infinite;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes colorFlow {
            0%, 100% { background: linear-gradient(90deg, var(--accent-blue), #6c5ce7); }
            50% { background: linear-gradient(90deg, #6c5ce7, var(--accent-blue)); }
        }

        .loading-container h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 1.8rem;
            position: relative;
            padding-bottom: 15px;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        .loading-container h2::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--accent-blue);
            border-radius: 2px;
            animation: expandWidth 0.8s ease-out 0.8s both;
        }

        @keyframes expandWidth {
            from { width: 0; }
            to { width: 80px; }
        }

        .message {
            margin-top: 25px;
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            padding: 15px;
            background: rgba(243, 156, 18, 0.06);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--warning);
            animation: fadeIn 0.8s ease-out 1s both;
        }

        .message a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-med);
        }
        .message a:hover {
            text-decoration: underline;
            color: #5a7cff;
        }

        /* Support Button */
        .support-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent-blue), #5a7cff);
            color: #fff;
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: var(--transition-med);
            box-shadow: 0 4px 20px rgba(43, 122, 255, 0.25);
            animation: fadeIn 0.8s ease-out 1.2s both;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        .support-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(43, 122, 255, 0.35);
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, #3b8aff, #6a8aff);
        }

        .support-button:active {
            transform: scale(0.98);
        }

        .support-button i {
            margin-right: 8px;
        }

        /* Status Indicator */
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            padding: 12px 20px;
            background: rgba(243, 156, 18, 0.08);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--warning);
            animation: shake 0.8s ease-out 0.5s both, pulseWarning 2s ease-in-out infinite 1s;
        }

        .status-icon {
            font-size: 1.5rem;
            color: var(--warning);
            margin-right: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        .status-text {
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        @keyframes pulseWarning {
            0%, 100% { background: rgba(243, 156, 18, 0.08); border-left-color: var(--warning); }
            50% { background: rgba(243, 156, 18, 0.15); border-left-color: #ff8c00; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Infinity Preloader */
        .ip {
            width: 200px;
            height: 100px;
            margin: 0 auto 10px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .ip__track {
            stroke: var(--border-subtle);
        }

        .ip__worm1,
        .ip__worm2 {
            animation: worm1 2s linear infinite;
        }

        .ip__worm2 {
            animation-name: worm2;
        }

        @keyframes worm1 {
            from { stroke-dashoffset: 0; }
            50% { animation-timing-function: steps(1); stroke-dashoffset: -358; }
            50.01% { animation-timing-function: linear; stroke-dashoffset: 358; }
            to { stroke-dashoffset: 0; }
        }

        @keyframes worm2 {
            from { stroke-dashoffset: 358; }
            50% { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -358; }
        }

        /* Frozen Effect (subtle overlay) */
        .frozen-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg,
                rgba(255,255,255,0.02) 0%,
                rgba(255,255,255,0.04) 50%,
                rgba(255,255,255,0.02) 100%);
            pointer-events: none;
            opacity: 0.4;
            animation: frostShimmer 3s ease-in-out infinite;
        }

        @keyframes frostShimmer {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }

        /* Floating buttons (Telegram & Email) */
        .float-btn {
            position: fixed;
            left: 24px;
            z-index: 1000;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
            transition: var(--transition-med);
        }
        .float-btn:hover {
            transform: scale(1.08) translateY(-2px);
        }
        .float-btn .tooltip {
            position: absolute;
            left: 68px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-med);
        }
        .float-btn:hover .tooltip {
            opacity: 1;
        }

        .telegram-float {
            bottom: 100px;
            background: #0088cc;
        }
        .telegram-float .telegram-icon {
            width: 28px;
            height: 28px;
            filter: brightness(0) invert(1);
        }

        .email-float {
            bottom: 168px;
            background: linear-gradient(135deg, #2b7aff, #5a7cff);
        }
        .email-float .email-icon {
            color: #fff;
            font-size: 1.4rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .loading-container {
                padding: 30px 20px;
                width: 95%;
            }
            .loading-container h2 {
                font-size: 1.5rem;
            }
            .message {
                font-size: 0.95rem;
            }
            .ip {
                width: 160px;
                height: 80px;
            }
            .float-btn {
                width: 48px;
                height: 48px;
                left: 14px;
            }
            .telegram-float {
                bottom: 80px;
            }
            .email-float {
                bottom: 140px;
            }
            .float-btn .tooltip {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .loading-container h2 {
                font-size: 1.3rem;
            }
            .support-button {
                font-size: 0.95rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="loading-container">
            <!-- Frozen Effect Overlay -->
            <div class="frozen-effect"></div>

            <!-- Status Indicator -->
            <div class="status-indicator">
                <i class="fas fa-exclamation-triangle status-icon"></i>
                <span class="status-text">Account Status: Restricted</span>
            </div>

            <!-- Infinity Preloader -->
            <svg class="ip" viewBox="0 0 256 128" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#2b7aff" />
                        <stop offset="50%" stop-color="#6c5ce7" />
                        <stop offset="100%" stop-color="#2b7aff" />
                    </linearGradient>
                    <linearGradient id="grad2" x1="1" y1="0" x2="0" y2="0">
                        <stop offset="0%" stop-color="#2b7aff" />
                        <stop offset="50%" stop-color="#6c5ce7" />
                        <stop offset="100%" stop-color="#2b7aff" />
                    </linearGradient>
                </defs>
                <g fill="none" stroke-linecap="round" stroke-width="16">
                    <g class="ip__track" stroke="rgba(255,255,255,0.06)">
                        <path d="M8,64s0-56,60-56,60,112,120,112,60-56,60-56"/>
                        <path d="M248,64s0-56-60-56-60,112-120,112S8,64,8,64"/>
                    </g>
                    <g stroke-dasharray="180 656">
                        <path class="ip__worm1" stroke="url(#grad1)" stroke-dashoffset="0" d="M8,64s0-56,60-56,60,112,120,112,60-56,60-56"/>
                        <path class="ip__worm2" stroke="url(#grad2)" stroke-dashoffset="358" d="M248,64s0-56-60-56-60,112-120,112S8,64,8,64"/>
                    </g>
                </g>
            </svg>

            <h2>Transactions Frozen</h2>

            <p class="message">
                Your account transactions have been temporarily frozen due to suspicious activity.
                Please contact customer support for verification and assistance.
            </p>

            <a href="#" class="support-button">
                <i class="fas fa-headset"></i>
                Contact Live Support
            </a>
        </div>
    </div>

    <!-- ====== FLOATING BUTTONS ====== -->
    <!-- Telegram -->
    <a href="https://t.me/" class="float-btn telegram-float" target="_blank" rel="noopener" aria-label="Telegram support">
        <svg class="telegram-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.5 2.5L1.5 10.5L8.5 14.5L17.5 7.5L10.5 15.5L13.5 22.5L22.5 2.5Z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M10.5 15.5L8.5 20.5L5.5 14.5" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
        <span class="tooltip">Telegram Support</span>
    </a>

    <!-- Email -->
    <a href="mailto:" class="float-btn email-float" aria-label="Email support">
        <i class="fas fa-envelope email-icon"></i>
        <span class="tooltip">Email Support</span>
    </a>

    <script>
        // Interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            const supportButton = document.querySelector('.support-button');
            const statusIndicator = document.querySelector('.status-indicator');

            supportButton.addEventListener('click', function(e) {
                e.preventDefault();
                // Simulate click feedback
                this.style.transform = 'scale(0.96)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
                console.log('Support button clicked – add your live chat or support link here.');
            });

            statusIndicator.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.02)';
                this.style.transition = 'transform 0.2s ease';
            });
            statusIndicator.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
        });

        // Service Worker registration (if you use one)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("{% static 'sw.js' %}")
                .then(reg => console.log('✅ SW registered:', reg))
                .catch(err => console.log('❌ SW registration failed:', err));
        }
    </script>
</body>
</html>
